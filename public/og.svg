<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#dfe3ee"/>

  <!-- Neumorphic card -->
  <rect x="80" y="80" width="1040" height="470" rx="32"
    fill="#dfe3ee"
    filter="url(#neu)"/>

  <defs>
    <filter id="neu" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="8" dy="8" stdDeviation="16" flood-color="#bcc0cb" flood-opacity="1"/>
      <feDropShadow dx="-8" dy="-8" stdDeviation="16" flood-color="#ffffff" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Accent line -->
  <rect x="80" y="80" width="480" height="4" rx="2" fill="url(#accent)"/>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f72f5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4f72f5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Emoji -->
  <text x="140" y="310" font-size="120" font-family="system-ui">👨🏻‍💻</text>

  <!-- Name -->
  <text x="360" y="260" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#1e293b">Phil Kellogg</text>

  <!-- Role -->
  <text x="362" y="320" font-family="system-ui, sans-serif" font-size="34" font-weight="500" fill="#4f72f5">Fullstack Engineer · Frontend Specialist</text>

  <!-- Divider -->
  <rect x="360" y="348" width="680" height="2" rx="1" fill="#bcc0cb" opacity="0.5"/>

  <!-- Skills row -->
  <text x="362" y="400" font-family="system-ui, sans-serif" font-size="28" fill="#64748b">Vue.js · React · TypeScript · Laravel · FastAPI</text>

  <!-- Domain -->
  <text x="362" y="460" font-family="system-ui, sans-serif" font-size="26" font-weight="600" fill="#4f72f5" opacity="0.8">faradaydev.ca</text>
</svg>
