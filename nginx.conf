server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Astro hashes all asset filenames — cache them forever
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML should always revalidate
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Serve files directly, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compress text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
